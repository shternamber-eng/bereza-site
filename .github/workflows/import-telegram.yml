name: Import Telegram posts (Bereza)

on:
  schedule:
    - cron: '0 * * * *'   # каждый час
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Import new Telegram posts
        run: node import-tools/import-telegram-cron.mjs
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add import-tools/state/telegram-last-id.json
          git diff --staged --quiet || git commit -m "chore: update telegram import state"
          git push
