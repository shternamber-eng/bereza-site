name: Import YouTube videos (Bereza)

on:
  schedule:
    - cron: '0 * * * *'   # каждый час
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Import new YouTube videos
        run: node import-tools/import-youtube-videos-cron.mjs
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add import-tools/state/youtube-imported-ids.json
          git diff --staged --quiet || git commit -m "chore: update YouTube import state"
          git push
