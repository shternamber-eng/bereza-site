name: Deploy WordPress theme via SFTP

on:
  push:
    branches: [main, telegram-automation]
    paths:
      - 'bereza-wp-theme/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Deploy theme via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT || '22' }}
          local_path: ./bereza-wp-theme/*
          remote_path: ${{ secrets.SFTP_THEME_PATH }}
          sftp_only: true
          delete_remote_files: false
